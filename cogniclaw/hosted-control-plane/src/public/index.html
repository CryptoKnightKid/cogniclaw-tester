<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CogniClaw Mission Control</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #151f34;
      --muted: #9fb0d4;
      --text: #edf2ff;
      --accent: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --border: #24304e;
    }
    body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; background: radial-gradient(circle at top, #172748, var(--bg)); color: var(--text); }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .card { background: linear-gradient(180deg, #17233f, var(--panel)); border: 1px solid var(--border); border-radius: 12px; padding: 16px; flex: 1; min-width: 240px; }
    .title { font-size: 28px; margin: 0 0 12px; }
    .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    .value { font-size: 22px; margin-top: 4px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
    input, button { border-radius: 8px; border: 1px solid var(--border); background: #0f1830; color: var(--text); padding: 10px; }
    button { cursor: pointer; background: #1f6feb; border-color: #1f6feb; }
    button.secondary { background: transparent; border-color: #47619b; }
    pre { white-space: pre-wrap; word-break: break-word; color: #d5def5; background: #0e162a; border: 1px solid var(--border); border-radius: 8px; padding: 12px; max-height: 280px; overflow: auto; }
    .hidden { display: none; }
    .ok { color: var(--accent); }
    .warn { color: var(--warn); }
    .err { color: var(--danger); }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">CogniClaw Mission Control (Hosted)</h1>

    <div class="card" id="auth-panel">
      <div class="label">Authentication</div>
      <div class="row" style="margin-top:10px;">
        <input id="email" placeholder="email" style="flex:1; min-width:220px;" />
        <input id="password" type="password" placeholder="password" style="flex:1; min-width:220px;" />
        <input id="orgName" placeholder="organization (signup only)" style="flex:1; min-width:220px;" />
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="signupBtn">Sign up</button>
        <button id="loginBtn" class="secondary">Login</button>
        <button id="refreshBtn" class="secondary">Refresh Dashboard</button>
      </div>
      <p id="authStatus" class="label" style="margin-top:10px;">Not authenticated</p>
    </div>

    <div id="dashboard" class="grid hidden" style="margin-top:12px;">
      <div class="card">
        <div class="label">Subscription</div>
        <div id="subscription" class="value">-</div>
      </div>
      <div class="card">
        <div class="label">Runs Remaining</div>
        <div id="runsRemaining" class="value">-</div>
      </div>
      <div class="card">
        <div class="label">Storage Remaining (MB)</div>
        <div id="storageRemaining" class="value">-</div>
      </div>
      <div class="card">
        <div class="label">Runtime Uptime (s)</div>
        <div id="uptime" class="value">-</div>
      </div>
      <div class="card">
        <div class="label">Channel Health</div>
        <div id="channelsHealth" class="value">-</div>
      </div>
      <div class="card">
        <div class="label">Files</div>
        <div id="fileCount" class="value">-</div>
      </div>
    </div>

    <div id="rawPanel" class="card hidden" style="margin-top:12px;">
      <div class="label">Raw Dashboard Payload</div>
      <pre id="rawOutput"></pre>
    </div>
  </div>

  <script>
    const state = { token: null };

    function authHeaders() {
      if (!state.token) return { 'content-type': 'application/json' };
      return {
        'content-type': 'application/json',
        authorization: `Bearer ${state.token}`
      };
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: {
          ...(options.headers || {}),
          ...authHeaders()
        }
      });

      const text = await response.text();
      let body;
      try { body = JSON.parse(text); } catch { body = { raw: text }; }

      if (!response.ok) {
        throw new Error(body.error || `Request failed: ${response.status}`);
      }

      return body;
    }

    function setStatus(text, cls = '') {
      const el = document.getElementById('authStatus');
      el.textContent = text;
      el.className = `label ${cls}`;
    }

    async function doSignup() {
      const payload = {
        organizationName: document.getElementById('orgName').value || 'My Org',
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };

      const result = await api('/auth/signup', { method: 'POST', body: JSON.stringify(payload) });
      state.token = result.token;
      setStatus(`Signed up as ${result.user.email}`, 'ok');
      await refreshDashboard();
    }

    async function doLogin() {
      const payload = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };

      const result = await api('/auth/login', { method: 'POST', body: JSON.stringify(payload) });
      state.token = result.token;
      setStatus(`Logged in as ${result.user.email}`, 'ok');
      await refreshDashboard();
    }

    async function refreshDashboard() {
      if (!state.token) {
        setStatus('Please login first', 'warn');
        return;
      }

      const [subscription, quota, uptime, channels, files] = await Promise.all([
        api('/billing/subscription'),
        api('/usage/quota'),
        api('/dashboard/uptime'),
        api('/channels/health'),
        api('/files/list')
      ]);

      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('rawPanel').classList.remove('hidden');

      document.getElementById('subscription').textContent = `${subscription.status || 'trialing'} / ${subscription.planId || 'starter'}`;
      document.getElementById('runsRemaining').textContent = quota.runs ? `${quota.runs.remaining}` : '-';
      document.getElementById('storageRemaining').textContent = quota.storageMb ? `${quota.storageMb.remaining}` : '-';
      document.getElementById('uptime').textContent = `${uptime.uptimeSeconds || 0}`;
      document.getElementById('channelsHealth').textContent = `${(channels.channels || []).length} connected`;
      document.getElementById('fileCount').textContent = `${(files.files || []).length}`;

      document.getElementById('rawOutput').textContent = JSON.stringify({ subscription, quota, uptime, channels, files }, null, 2);
    }

    document.getElementById('signupBtn').addEventListener('click', () => doSignup().catch((err) => setStatus(err.message, 'err')));
    document.getElementById('loginBtn').addEventListener('click', () => doLogin().catch((err) => setStatus(err.message, 'err')));
    document.getElementById('refreshBtn').addEventListener('click', () => refreshDashboard().catch((err) => setStatus(err.message, 'err')));
  </script>
</body>
</html>
